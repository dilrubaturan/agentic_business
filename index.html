<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic BPC Framework</title>
<style>
:root{
  --bg:#0a0c10;--surface:#11141a;--surface2:#181c24;--border:#232836;
  --text:#e8eaf0;--muted:#6b7280;--radius:8px;
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
  --ic:#4f8ef7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOP BAR ── */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:48px;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--ic);white-space:nowrap;letter-spacing:.01em;}
.sep{color:var(--border);font-size:16px;}
#ind-tabs{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;}
#ind-tabs::-webkit-scrollbar{display:none;}
.ind-tab{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:5px;cursor:pointer;white-space:nowrap;font-size:12px;color:var(--muted);border:1px solid transparent;transition:all .15s;}
.ind-tab:hover{color:var(--text);background:var(--surface2);}
.ind-tab.active{color:#fff;border-color:currentColor;background:color-mix(in srgb,currentColor 12%,transparent);}

/* ── LAYOUT ── */
#main{display:flex;flex:1;overflow:hidden;}

/* ── LEFT SIDEBAR (process list) ── */
#sidebar{width:188px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0;}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;padding:8px 12px 4px;}
.proc-btn{width:100%;text-align:left;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px 12px;font-size:12px;font-family:var(--font);display:flex;align-items:center;gap:7px;transition:all .12s;border-left:2px solid transparent;}
.proc-btn:hover{color:var(--text);background:var(--surface2);}
.proc-btn.active{color:var(--ic);border-left-color:var(--ic);background:color-mix(in srgb,var(--ic) 8%,transparent);}
.proc-btn .pnum{font-size:10px;color:var(--muted);font-family:var(--mono);margin-left:auto;}

/* ── CENTRE (simulation) ── */
#centre{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
#centre-scroll{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
#centre-scroll::-webkit-scrollbar{width:4px;}
#centre-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── RIGHT PANEL (assess + config) ── */
#right{width:320px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#right-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.right-tab{flex:1;padding:10px 8px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;text-align:center;transition:all .15s;user-select:none;letter-spacing:.03em;}
.right-tab.active{color:var(--text);border-bottom-color:var(--ic);}
#right-body{flex:1;overflow-y:auto;padding:14px;}
#right-body::-webkit-scrollbar{width:3px;}
#right-body::-webkit-scrollbar-thumb{background:var(--border);}

/* ── PROC HEADER ── */
#proc-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.ph-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;margin-bottom:6px;border:1px solid currentColor;font-family:var(--mono);}
.ph-top{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.ph-num{font-family:var(--mono);font-size:10px;color:var(--muted);}
.ph-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.ph-desc{color:var(--muted);font-size:12px;line-height:1.5;}

/* ── AGENT ARCHITECTURE ── */
#agent-arch{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.arch-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.arch-svg-wrap{width:100%;overflow:visible;}
.arch-node-box{fill:var(--surface2);stroke:var(--border);stroke-width:1;}
.arch-node-box.orch{fill:color-mix(in srgb,var(--ic) 10%,#11141a);stroke:var(--ic);}
.arch-node-label{font-family:'DM Mono',monospace;font-size:10px;fill:#6b7280;}
.arch-node-title{font-family:'DM Sans',system-ui;font-size:11px;font-weight:600;fill:#e8eaf0;}
.arch-connector{stroke:var(--border);stroke-width:1;fill:none;}
.arch-connector.active{stroke:var(--ic);opacity:.5;}

/* ── RUN BAR ── */
#run-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:10px;}
#run-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--ic);color:#fff;border:none;border-radius:5px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
#run-btn:hover{opacity:.85;}
#run-btn:disabled{opacity:.45;cursor:not-allowed;}
#prog-wrap{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
#prog-bar{height:100%;width:0;background:var(--ic);border-radius:2px;transition:width .3s;}
#prog-label{font-size:11px;color:var(--muted);font-family:var(--mono);white-space:nowrap;}

/* ── STEPS GRID ── */
#steps-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;transition:border-color .2s;}
.step-card.running{border-color:var(--ic);}
.step-card.done{border-color:color-mix(in srgb,var(--ic) 35%,transparent);}
.step-card.pending{opacity:.4;}
.sc-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.sc-meta{flex:1;}
.sc-num{font-family:var(--mono);font-size:10px;color:var(--muted);}
.sc-name{font-weight:600;font-size:12px;color:var(--text);line-height:1.3;}
.sc-agent{font-size:11px;color:var(--muted);margin-bottom:6px;}
.sc-agent em{color:var(--ic);font-style:normal;}
.sc-output{font-size:11.5px;color:var(--muted);line-height:1.55;border-top:1px solid var(--border);padding-top:7px;display:none;}
.step-card.done .sc-output,.step-card.running .sc-output{display:block;}
.sc-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:3px;}
.sc-badge.running{background:color-mix(in srgb,#f5a623 15%,transparent);color:#f5a623;}
.sc-badge.done{background:color-mix(in srgb,#1edb8b 15%,transparent);color:#1edb8b;}

/* ── BOTTOM PANELS (log + output) ── */
#bottom{background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
.bot-tabs{display:flex;border-bottom:1px solid var(--border);}
.bot-tab{padding:8px 16px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;user-select:none;letter-spacing:.03em;}
.bot-tab.active{color:var(--text);border-bottom-color:var(--ic);}
.bot-body{padding:12px;max-height:160px;overflow-y:auto;font-size:11.5px;}
.bot-body::-webkit-scrollbar{width:3px;}
.bot-body::-webkit-scrollbar-thumb{background:var(--border);}
#log-body{font-family:var(--mono);color:#1edb8b;line-height:1.8;}
.log-ts{color:var(--muted);}
#out-body{color:var(--muted);line-height:1.6;}
.out-item{margin-bottom:8px;padding:8px 10px;background:var(--surface2);border-radius:5px;border-left:2px solid var(--ic);}
.out-step{font-weight:600;color:var(--text);font-size:11px;margin-bottom:3px;}

/* ── ASSESS PANEL (right) ── */
.r-section{margin-bottom:16px;}
.r-title{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.assess-dots{display:flex;align-items:center;margin-bottom:14px;}
.a-dot{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;cursor:pointer;font-family:var(--mono);}
.a-dot.active{border-color:var(--ic);color:var(--ic);}
.a-dot.done{border-color:#1edb8b;background:#1edb8b;color:#000;}
.a-line{flex:1;height:1px;background:var(--border);margin:0 3px;}
.a-form{display:none;}
.a-form.active{display:block;}
.a-q{font-weight:600;font-size:12px;margin-bottom:8px;color:var(--text);}
.a-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.a-pill{padding:4px 10px;border-radius:4px;border:1px solid var(--border);font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s;}
.a-pill:hover{border-color:var(--ic);color:var(--text);}
.a-pill.sel{border-color:var(--ic);background:color-mix(in srgb,var(--ic) 12%,transparent);color:var(--text);}
.a-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:6px 10px;color:var(--text);font-family:var(--font);font-size:12px;margin-bottom:10px;}
.a-input:focus{outline:none;border-color:var(--ic);}
.a-btn{padding:7px 14px;background:var(--ic);color:#fff;border:none;border-radius:5px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;}
.a-result{background:var(--surface2);border-radius:6px;padding:12px;border:1px solid var(--border);margin-top:10px;}
.ar-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.ar-metric{background:var(--surface);border-radius:5px;padding:8px;text-align:center;}
.arv{font-size:18px;font-weight:700;color:var(--ic);font-family:var(--mono);}
.arl{font-size:9px;color:var(--muted);margin-top:1px;}
.ar-phases{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:8px;}
.ar-check-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.ar-check ul{list-style:none;font-size:11px;color:var(--muted);}
.ar-check li::before{content:"+ ";color:#1edb8b;}
.assess-progress{margin-bottom:12px;}
.ap-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.ap-fill{height:100%;background:var(--ic);border-radius:2px;transition:width .3s;}
.ap-label{font-size:10px;color:var(--muted);font-family:var(--mono);}
.a-sub{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5;}
.a-back{padding:6px 11px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:var(--font);font-size:11px;cursor:pointer;}
.a-back:hover{color:var(--text);border-color:var(--muted);}

/* ── CONFIG PANEL (right) ── */
.cfg-section{margin-bottom:12px;}
.cfg-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;}
.cfg-pills{display:flex;flex-wrap:wrap;gap:4px;}
.cfg-pill{padding:3px 9px;border-radius:4px;border:1px solid var(--border);font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s;font-family:var(--mono);}
.cfg-pill.sel{border-color:var(--ic);background:color-mix(in srgb,var(--ic) 12%,transparent);color:var(--text);}
.cfg-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:6px 10px;color:var(--text);font-family:var(--font);font-size:11px;margin-bottom:6px;}
.cfg-input:focus{outline:none;border-color:var(--ic);}
.cfg-gen{padding:7px 14px;background:var(--ic);color:#fff;border:none;border-radius:5px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;width:100%;margin-bottom:8px;}
.cfg-gen:disabled{opacity:.5;cursor:not-allowed;}
#cfg-out{background:#080a0e;border:1px solid var(--border);border-radius:5px;padding:10px;font-family:var(--mono);font-size:10.5px;color:#1edb8b;white-space:pre-wrap;max-height:200px;overflow-y:auto;display:none;margin-bottom:6px;}
.cfg-actions{display:flex;gap:6px;}
.cfg-act{padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;cursor:pointer;font-family:var(--font);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;600&family=DM+Mono&display=swap" rel="stylesheet">
</head>

  <div id="ind-tabs"></div>

<div id="main">

  <!-- LEFT: process list -->
  <div id="sidebar">
    <div class="sidebar-label">Process Domains</div>

      <div id="steps-grid"></div>

    <div id="bottom">

</div>

function mapProcesses(d){
  const always = ['p99','p55','p90']; // always relevant
  const byIndustry = {
    mfg:    ['p70','p60','p10','p75','p50','p65','p95','p80'],
    retail: ['p65','p60','p30','p75','p40','p50','p20','p85'],
    fs:     ['p65','p90','p85','p30','p20','p80','p75','p50'],
    hc:     ['p95','p20','p10','p55','p75','p90','p50','p30'],
    ps:     ['p80','p85','p65','p20','p30','p75','p50','p40'],
    gov:    ['p90','p20','p75','p80','p55','p50','p95','p10'],
  };
  const byOps = {
    'buying and procurement':       ['p75','p60'],
    'sales and quoting':            ['p85','p65'],
    'manufacturing or production':  ['p70','p60','p10'],
    'field service or maintenance': ['p95','p10'],
    'project delivery':             ['p80','p65'],
    'finance and reporting':        ['p90','p65'],
    'hr and workforce':             ['p55'],
    'customer service':             ['p20','p95'],
    'marketing and campaigns':      ['p30','p40'],
    'logistics and warehousing':    ['p60','p75'],
  };
  const byPain = {
    'too much manual data entry':   ['p90','p65','p75'],
    'slow approvals and workflows': ['p75','p80','p65'],
    'poor visibility across teams': ['p50','p90','p80'],
    'high cost of operations':      ['p75','p55','p70'],
    'slow customer response times': ['p20','p95','p85'],
    'compliance and audit risk':    ['p90','p99','p55'],
    'inventory and supply issues':  ['p60','p75','p70'],
    'project overruns':             ['p80','p50'],
  };

  let scored = {};
  const add = (ids, weight) => ids.forEach(id=>{ scored[id]=(scored[id]||0)+weight; });

  add(always, 3);
  add(byIndustry[d.industry] || [], 2);
  (d.ops||[]).forEach(op => add(byOps[op]||[], 3));
  (d.pains||[]).forEach(pain => add(byPain[pain]||[], 4));

  // size modifier — smaller companies use fewer agents
  const sizeLimit = {micro:4, small:6, mid:9, enterprise:15}[d.size]||9;

  return Object.entries(scored)
    .sort((a,b)=>b[1]-a[1])
    .slice(0, sizeLimit)
    .map(([id,score])=>({id, score, proc: DATA.PROCESSES.find(p=>p.id===id)}))
    .filter(x=>x.proc);
}

  const gap = Math.max(6, (W - n*NW) / (n+1));
  const totalSpecW = n*NW + (n-1)*gap;
  const specX0 = Math.max(0, (W - totalSpecW) / 2);
  const orchX = (W - NW) / 2;
  const orchCX = orchX + NW/2;
  const orchBY = ORCH_Y + NH;

  // Orch agent — use process icon
  const orchAgent = proc().agents.find(a=>a.role==='orchestrator') || {icon:'🧠',label:'Orchestrator'};

  // Elbow connectors: orch bottom -> midY -> each spec top
  const midY = ORCH_Y + NH + 22;
  const lines = specs.map((_, i) => {
    const sx = specX0 + i*(NW+gap) + NW/2;
    return `<path class="arch-connector" d="M${orchCX},${orchBY} L${orchCX},${midY} L${sx},${midY} L${sx},${SPEC_Y}"/>`;
  }).join('');

  // Specialist nodes with emoji
  const specNodes = specs.map((a, i) => {
    const x = specX0 + i*(NW+gap);
    const cx = x + NW/2;
    return `<g>
        <rect class="arch-node-box" x="${x}" y="${SPEC_Y}" width="${NW}" height="${NH}" rx="4"/>
        <text font-size="16" x="${cx}" y="${SPEC_Y+18}" text-anchor="middle" dominant-baseline="middle">${a.icon}</text>
        <text class="arch-node-title" x="${cx}" y="${SPEC_Y+38}" text-anchor="middle">${a.label}</text>
      </g>`;
  }).join('');

  const totalH = SPEC_Y + NH + 8;

  $('agent-arch').innerHTML = `
    <div class="arch-label">Agent Orchestration Architecture</div>
    <svg class="arch-svg-wrap" viewBox="0 0 ${W} ${totalH}" style="display:block;width:100%;height:auto;overflow:visible">
      ${lines}
      <g>
        <rect class="arch-node-box orch" x="${orchX}" y="${ORCH_Y}" width="${NW}" height="${NH}" rx="4"/>
        <text font-size="16" x="${orchCX}" y="${ORCH_Y+16}" text-anchor="middle" dominant-baseline="middle">${orchAgent.icon}</text>
        <text class="arch-node-title" x="${orchCX}" y="${ORCH_Y+38}" text-anchor="middle">Orchestrator</text>
      </g>
      ${specNodes}
    </svg>`;
}

function renderSteps(runIdx=-1, doneSet=new Set()){
  $('steps-grid').innerHTML=steps().map((s,i)=>{
    const done=doneSet.has(i), run=i===runIdx;
    return `<div class="step-card${run?' running':done?' done':' pending'}">
      <div class="sc-top">
        <div class="sc-meta">
          <div class="sc-num">${s.num}</div>
          <div class="sc-name">${s.name}</div>
        </div>
        ${run?'<span class="sc-badge running">running</span>':done?'<span class="sc-badge done">done</span>':''}
      </div>
      <div class="sc-agent">Agent: <em>${s.agent}</em></div>
      <div class="sc-output">${s.output}</div>
    </div>`;
  }).join('');
}

// ── SIMULATION ─────────────────────────────────────────────────────────────
function resetSim(){
  if(simTimer) clearTimeout(simTimer);
  simRunning=false;
  $('run-btn').disabled=false;
  $('run-btn').textContent='Run Simulation';
  $('prog-bar').style.width='0';
  $('prog-label').textContent='Ready';
  $('log-body').textContent='Awaiting simulation run...';
  $('out-body').innerHTML='';
  renderSteps();
}

function runSim(){
  if(simRunning) return;
  simRunning=true;
  $('run-btn').disabled=true;
  const ss=steps(), total=ss.length;
  let idx=0;
  const done=new Set(), logs=[], outs=[];

  function tick(){
    if(idx>=total){
      $('prog-bar').style.width='100%';
      $('prog-label').textContent='Complete';
      $('run-btn').disabled=false;
      $('run-btn').textContent='Re-run';
      simRunning=false;
      $('out-body').innerHTML=outs.map(o=>`
        <div class="out-item">
          <div class="out-step">${o.num} — ${o.name}</div>
          <div>${o.output}</div>
        </div>`).join('');
      return;
    }
    const s=ss[idx];
    $('prog-bar').style.width=Math.round((idx/total)*100)+'%';
    $('prog-label').textContent=`Step ${idx+1} / ${total}`;
    renderSteps(idx,done);
    const ts=new Date().toLocaleTimeString('en-GB',{hour12:false});
    logs.push(`<div><span class="log-ts">[${ts}]</span>  ${s.agent}  →  ${s.name}</div>`);
    $('log-body').innerHTML=logs.join('');
    $('log-body').scrollTop=$('log-body').scrollHeight;
    setTimeout(()=>{
      done.add(idx); outs.push(s);
      renderSteps(-1,done);
      idx++;
      simTimer=setTimeout(tick,550);
    },850);
  }
  tick();
}

$('run-btn').addEventListener('click',()=>{
  if($('run-btn').textContent==='Re-run') resetSim();
  setTimeout(runSim, 50);
});

  { id:'ops', label:'Which operations does your team run day to day?',

function mapProcesses(d){
  const always=['p99','p55','p90'];
  const byInd={mfg:['p70','p60','p10','p75','p50','p65','p95','p80'],retail:['p65','p60','p30','p75','p40','p50','p20','p85'],fs:['p65','p90','p85','p30','p20','p80','p75','p50'],hc:['p95','p20','p10','p55','p75','p90','p50','p30'],ps:['p80','p85','p65','p20','p30','p75','p50','p40'],gov:['p90','p20','p75','p80','p55','p50','p95','p10']};
  const byOps={'buying and procurement':['p75','p60'],'sales and quoting':['p85','p65'],'manufacturing or production':['p70','p60','p10'],'field service or maintenance':['p95','p10'],'project delivery':['p80','p65'],'finance and reporting':['p90','p65'],'hr and workforce':['p55'],'customer service':['p20','p95'],'marketing and campaigns':['p30','p40'],'logistics and warehousing':['p60','p75']};
  const byPain={'too much manual data entry':['p90','p65','p75'],'slow approvals and workflows':['p75','p80','p65'],'poor visibility across teams':['p50','p90','p80'],'high cost of operations':['p75','p55','p70'],'slow customer response times':['p20','p95','p85'],'compliance and audit risk':['p90','p99','p55'],'inventory and supply issues':['p60','p75','p70'],'project overruns':['p80','p50']};
  const sizeLimit={micro:4,small:6,mid:9,enterprise:15}[d.size]||9;
  let scored={};
  const add=(ids,w)=>ids.forEach(id=>{scored[id]=(scored[id]||0)+w;});
  add(always,3);
  add(byInd[d.industry]||[],2);
  (d.ops||[]).forEach(op=>add(byOps[op]||[],3));
  (d.pains||[]).forEach(p=>add(byPain[p]||[],4));
  return Object.entries(scored).sort((a,b)=>b[1]-a[1]).slice(0,sizeLimit)
    .map(([id,score])=>({id,score,proc:DATA.PROCESSES.find(p=>p.id===id)})).filter(x=>x.proc);
}

function renderAssess(){
  const total=QUESTIONS.length;
  if(assessStep===0){
    $('assess-panel').innerHTML=`
      <div style="padding:6px 0 14px">
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">Tell us about your business</div>
        <div style="font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:14px">Answer six short questions about your organisation and operations. We will recommend the right AI agents and processes — no need to know the Microsoft catalog upfront.</div>
        <button class="a-btn" onclick="assessStep=1;renderAssess()">Start assessment</button>
      </div>`;
    return;
  }
  if(assessStep>total){renderAssessResult();return;}
  const q=QUESTIONS[assessStep-1];
  const curVal=assessData[q.id];
  const isMulti=q.type==='multi';
  $('assess-panel').innerHTML=`
    <div class="assess-progress">
      <div class="ap-bar"><div class="ap-fill" style="width:${Math.round(((assessStep-1)/total)*100)}%"></div></div>
      <div class="ap-label">Question ${assessStep} of ${total}</div>
    </div>
    <div class="a-q">${q.label}</div>
    <div class="a-sub">${q.sub}</div>
    <div class="a-pills" id="q-pills">
      ${q.options.map(o=>{
        const sel=isMulti?(Array.isArray(curVal)&&curVal.includes(o.v)):curVal===o.v;
        return `<div class="a-pill${sel?' sel':''}" data-v="${o.v}">${o.l}</div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:8px;margin-top:6px;align-items:center">
      ${assessStep>1?'<button class="a-back" onclick="assessStep--;renderAssess()">Back</button>':''}
      <button class="a-btn" onclick="aNext()">${assessStep===total?'Show recommendations':'Next'}</button>
    </div>`;
  document.querySelectorAll('#q-pills .a-pill').forEach(pill=>{
    pill.addEventListener('click',()=>{
      if(isMulti){
        const max=q.max||99;
        const already=pill.classList.contains('sel');
        const selCount=document.querySelectorAll('#q-pills .sel').length;
        if(!already&&selCount>=max)return;
        pill.classList.toggle('sel');
        assessData[q.id]=[...document.querySelectorAll('#q-pills .sel')].map(x=>x.dataset.v);
      } else {
        document.querySelectorAll('#q-pills .sel').forEach(x=>x.classList.remove('sel'));
        pill.classList.add('sel');
        assessData[q.id]=pill.dataset.v;
      }
    });
  });
}

function aNext(){
  const q=QUESTIONS[assessStep-1];
  const val=assessData[q.id];
  const ok=q.type==='multi'?(Array.isArray(val)&&val.length>0):!!val;
  if(!ok){
    const el=document.querySelector('#q-pills');
    if(el){el.style.outline='1px solid #f75c5c';el.style.borderRadius='4px';setTimeout(()=>{el.style.outline='none';},1200);}
    return;
  }
  assessStep++;
  renderAssess();
}

function renderAssessResult(){
  const recs=mapProcesses(assessData);
  const col=ind().color;
  const n=recs.length;
  const sizeMul={micro:1,small:2,mid:4,enterprise:8}[assessData.size]||3;
  const aiMul={exploring:1,piloting:1.5,scaling:2,advanced:3}[assessData.aiready]||1.5;
  const agents=Math.round(n*4*Math.min(aiMul,2));
  const monthly=Math.round(n*sizeMul*280);
  const setup=Math.round(n*sizeMul*3800);
  const phase1=recs.slice(0,2).map(r=>r.proc.name);
  const phase2=recs.slice(2,5).map(r=>r.proc.name);
  const phase3=recs.slice(5).map(r=>r.proc.name);
  const indLabel=DATA.INDUSTRIES.find(i=>i.id===assessData.industry)?.name||'Your industry';
  $('assess-panel').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:12px;font-weight:600;color:var(--text)">Your AI process roadmap</div>
      <button class="a-back" onclick="assessStep=0;assessData={};renderAssess()">Start over</button>
    </div>
    <div style="background:var(--surface2);border-radius:5px;padding:9px 11px;margin-bottom:10px;border:1px solid var(--border)">
      <div style="font-size:10px;color:var(--muted);margin-bottom:2px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em">${indLabel} · ${assessData.size||''}</div>
      <div style="font-size:11px;color:var(--muted);line-height:1.6">Based on your operations and pain points, we identified <strong style="color:var(--text)">${n} process domains</strong> where agentic AI will have the highest impact.</div>
    </div>
    <div class="ar-grid" style="margin-bottom:10px">
      <div class="ar-metric"><div class="arv" style="color:${col}">${agents}</div><div class="arl">Agents</div></div>
      <div class="ar-metric"><div class="arv" style="color:${col}">€${(monthly/1000).toFixed(0)}K</div><div class="arl">/ month</div></div>
      <div class="ar-metric"><div class="arv" style="color:${col}">€${(setup/1000).toFixed(0)}K</div><div class="arl">setup</div></div>
    </div>
    <div style="margin-bottom:10px">
      <div class="ar-check-title" style="margin-bottom:6px">Recommended processes — ranked by impact</div>
      ${recs.map((r,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
          <div style="width:18px;height:18px;border-radius:3px;background:${i<2?col:'var(--surface2)'};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${i<2?'#000':'var(--muted)'};flex-shrink:0;font-family:var(--mono)">${i+1}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:600;color:var(--text)">${r.proc.name}</div>
            <div style="font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.proc.desc.split('.')[0]}</div>
          </div>
          <div style="font-size:9px;font-family:var(--mono);color:var(--muted);flex-shrink:0">${r.proc.num}</div>
        </div>`).join('')}
    </div>
    <div class="ar-phases" style="margin-bottom:10px">
      <strong>Phase 1 (0–3 mo):</strong> ${phase1.join(', ')}<br>
      ${phase2.length?`<strong>Phase 2 (3–6 mo):</strong> ${phase2.join(', ')}<br>`:''}
      ${phase3.length?`<strong>Phase 3 (6–12 mo):</strong> ${phase3.join(', ')}<br>`:''}
      <strong>Oversight model:</strong> ${assessData.oversight||'—'}
    </div>
    <div class="ar-check">
      <div class="ar-check-title">Preparation checklist</div>
      <ul>
        <li>D365 API credentials and environment access</li>
        <li>Process owner sign-off per domain</li>
        <li>Data quality baseline completed</li>
        <li>Azure AI Foundry subscription provisioned</li>
        <li>Change management plan in place</li>
        <li>Governance and escalation matrix defined</li>
      </ul>
    </div>`;
}

async function genConfig(){
  const p=proc(), i=ind();
  const btn=$('cfg-gen-btn'), out=$('cfg-out');
  cfgState.endpoint=$('az-ep')?.value||'';
  cfgState.rg=$('az-rg')?.value||'';
  btn.disabled=true; btn.textContent='Generating...';
  out.style.display='block'; out.textContent='Calling Claude API...';

  const prompt=`Generate a production Azure AI Foundry YAML config for:
Process: ${p.num} - ${p.name}
Industry: ${i.name}
Model: ${cfgState.model}
Mode: ${cfgState.mode}
Data sources: ${(cfgState.sources||[]).join(', ')}
Agents: ${p.agents.map(a=>a.label).join(', ')}
Steps: ${steps().map(s=>s.name).join(', ')}
Return ONLY valid YAML with: project metadata, agent definitions (role, model, tools, guardrails), data_sources, orchestration, monitoring, audit_log, managed_identity, spend_threshold. No explanation, no markdown fences.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const text=(data.content||[]).map(c=>c.text||'').join('').replace(/```ya?ml|```/gi,'').trim();
    out.textContent=text;
    $('cfg-acts').style.display='flex';
    window._yaml=text;
  } catch(e){ out.textContent='Error: '+e.message; }
  btn.disabled=false; btn.textContent='Generate AI Foundry Config';
}

function copyYaml(){ navigator.clipboard.writeText(window._yaml||'').then(()=>alert('Copied!')); }
function dlYaml(){
  const a=document.createElement('a');
  a.href='data:text/yaml;charset=utf-8,'+encodeURIComponent(window._yaml||'');
  a.download=`bpc-${curProc}-${curInd}.yaml`;
  a.click();
}

}
