<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic BPC Framework — Microsoft Dynamics 365</title>
<style>
:root{
  --bg:#0a0c10;--surface:#11141a;--surface2:#181c24;--border:#232836;
  --text:#e8eaf0;--muted:#6b7280;--accent:#4f8ef7;
  --green:#1edb8b;--amber:#f5a623;--purple:#b57af7;
  --teal:#5ce6c8;--red:#f75c5c;--blue:#4f8ef7;
  --radius:10px;--font:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;display:flex;flex-direction:column;}
/* ── TOP BAR ── */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:16px;height:52px;flex-shrink:0;}
#topbar .logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap;}
#topbar .sep{color:var(--border);font-size:18px;}
#ind-tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;}
#ind-tabs::-webkit-scrollbar{display:none;}
.ind-tab{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;font-size:13px;color:var(--muted);border:1px solid transparent;transition:all .15s;background:transparent;}
.ind-tab:hover{color:var(--text);background:var(--surface2);}
.ind-tab.active{color:#fff;border-color:currentColor;background:color-mix(in srgb,currentColor 12%,transparent);}
.ind-tab .ind-icon{font-size:15px;}
/* ── LAYOUT ── */
#main{display:flex;flex:1;overflow:hidden;}
/* ── SIDEBAR ── */
#sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;}
#sidebar::-webkit-scrollbar{width:4px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;padding:8px 14px 4px;}
.proc-btn{width:100%;text-align:left;background:none;border:none;color:var(--muted);cursor:pointer;padding:7px 14px;font-size:12.5px;font-family:var(--font);display:flex;align-items:center;gap:8px;transition:all .12s;border-left:3px solid transparent;}
.proc-btn:hover{color:var(--text);background:var(--surface2);}
.proc-btn.active{color:var(--ind-color,var(--accent));border-left-color:var(--ind-color,var(--accent));background:color-mix(in srgb,var(--ind-color,var(--accent)) 8%,transparent);}
.proc-btn .pnum{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
/* ── CONTENT AREA ── */
#content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
#content::-webkit-scrollbar{width:6px;}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
/* ── PROCESS HEADER ── */
#proc-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;}
#proc-header .ph-top{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
#proc-header .ph-icon{font-size:24px;}
#proc-header .ph-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
#proc-header .ph-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
#proc-header .ph-desc{color:var(--muted);font-size:13px;line-height:1.5;}
#proc-header .ph-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:8px;border:1px solid currentColor;}
/* ── AGENT MAP ── */
#agent-map{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.am-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.am-nodes{display:flex;align-items:center;gap:0;flex-wrap:wrap;gap:6px;}
.am-node{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;min-width:80px;cursor:default;}
.am-node.orchestrator{border-color:var(--ind-color,var(--accent));background:color-mix(in srgb,var(--ind-color,var(--accent)) 10%,transparent);}
.am-node .an-icon{font-size:18px;}
.am-node .an-label{font-size:10px;color:var(--muted);text-align:center;font-family:'DM Mono',monospace;}
.am-arrow{color:var(--border);font-size:16px;flex-shrink:0;}
/* ── RUN BAR ── */
#run-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:12px;}
#run-btn{display:flex;align-items:center;gap:8px;padding:8px 18px;background:var(--ind-color,var(--accent));color:#fff;border:none;border-radius:6px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
#run-btn:hover{opacity:.85;}
#run-btn:disabled{opacity:.5;cursor:not-allowed;}
#prog-bar-wrap{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
#prog-bar{height:100%;width:0;background:var(--ind-color,var(--accent));border-radius:3px;transition:width .3s;}
#prog-label{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;}
/* ── STEPS GRID ── */
#steps-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:900px){#steps-grid{grid-template-columns:1fr;}}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:border-color .2s,opacity .3s;}
.step-card.running{border-color:var(--ind-color,var(--accent));background:color-mix(in srgb,var(--ind-color,var(--accent)) 5%,var(--surface));}
.step-card.done{border-color:color-mix(in srgb,var(--ind-color,var(--accent)) 40%,transparent);}
.step-card.pending{opacity:.45;}
.sc-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sc-icon{font-size:18px;}
.sc-name{font-weight:600;font-size:13px;}
.sc-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.sc-agent{font-size:11px;color:var(--muted);margin-bottom:6px;}
.sc-agent span{color:var(--ind-color,var(--accent));}
.sc-output{font-size:12px;color:var(--muted);line-height:1.5;border-top:1px solid var(--border);padding-top:8px;display:none;}
.step-card.done .sc-output,.step-card.running .sc-output{display:block;}
.sc-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:'DM Mono',monospace;}
.sc-status.running{color:var(--amber);}
.sc-status.done{color:var(--green);}
/* ── BOTTOM PANELS ── */
#bottom-panels{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);}
.panel-tab{padding:10px 18px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;user-select:none;}
.panel-tab.active{color:var(--text);border-bottom-color:var(--ind-color,var(--accent));}
.panel-body{padding:16px;min-height:180px;}
/* LOG */
#log-body{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--green);line-height:1.8;}
.log-line{margin:0;}
.log-ts{color:var(--muted);}
/* OUTPUT */
#output-body{font-size:13px;line-height:1.6;color:var(--muted);}
#output-body .out-item{margin-bottom:10px;padding:10px;background:var(--surface2);border-radius:6px;border-left:3px solid var(--ind-color,var(--accent));}
#output-body .out-step{font-weight:600;color:var(--text);font-size:12px;margin-bottom:4px;}
/* ASSESS */
#assess-body{}
.assess-steps{display:flex;gap:0;margin-bottom:16px;}
.assess-step-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;cursor:pointer;}
.assess-step-dot.active{border-color:var(--ind-color,var(--accent));color:var(--ind-color,var(--accent));background:color-mix(in srgb,var(--ind-color,var(--accent)) 15%,transparent);}
.assess-step-dot.done{border-color:var(--green);background:var(--green);color:#000;}
.assess-line{flex:1;height:2px;background:var(--border);align-self:center;margin:0 4px;}
.assess-form{display:none;}
.assess-form.active{display:block;}
.assess-q{font-weight:600;font-size:13px;margin-bottom:10px;color:var(--text);}
.assess-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.assess-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s;}
.assess-pill:hover{border-color:var(--ind-color,var(--accent));color:var(--text);}
.assess-pill.sel{border-color:var(--ind-color,var(--accent));background:color-mix(in srgb,var(--ind-color,var(--accent)) 15%,transparent);color:var(--text);}
.assess-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;margin-bottom:12px;}
.assess-input:focus{outline:none;border-color:var(--ind-color,var(--accent));}
.assess-btn{padding:8px 18px;background:var(--ind-color,var(--accent));color:#fff;border:none;border-radius:6px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;}
.assess-result{background:var(--surface2);border-radius:8px;padding:16px;border:1px solid var(--border);}
.ar-title{font-weight:700;font-size:14px;margin-bottom:12px;color:var(--text);}
.ar-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
.ar-metric{background:var(--surface);border-radius:6px;padding:10px;text-align:center;}
.ar-metric .arv{font-size:20px;font-weight:700;color:var(--ind-color,var(--accent));font-family:'DM Mono',monospace;}
.ar-metric .arl{font-size:10px;color:var(--muted);margin-top:2px;}
.ar-phases{font-size:12px;color:var(--muted);line-height:1.7;}
.ar-check{margin-top:10px;}
.ar-check-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.ar-check ul{list-style:none;font-size:12px;color:var(--muted);}
.ar-check ul li::before{content:"✓ ";color:var(--green);}
/* CONFIG */
#config-body{}
.cfg-pills-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.cfg-pill{padding:4px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s;}
.cfg-pill.sel{border-color:var(--ind-color,var(--accent));background:color-mix(in srgb,var(--ind-color,var(--accent)) 15%,transparent);color:var(--text);}
.cfg-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;}
.cfg-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 11px;color:var(--text);font-family:var(--font);font-size:12px;margin-bottom:8px;}
.cfg-input:focus{outline:none;border-color:var(--ind-color,var(--accent));}
.cfg-gen-btn{padding:8px 16px;background:var(--ind-color,var(--accent));color:#fff;border:none;border-radius:6px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;margin-bottom:12px;}
#cfg-output{background:#0d0f14;border:1px solid var(--border);border-radius:6px;padding:12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--green);white-space:pre-wrap;max-height:220px;overflow-y:auto;display:none;}
.cfg-actions{display:flex;gap:8px;margin-top:8px;}
.cfg-act-btn{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;cursor:pointer;font-family:var(--font);}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>

  function tick(){
    if(idx>=total){
      $('prog-bar').style.width='100%';
      $('prog-label').textContent='Complete';
      $('run-btn').disabled=false;
      $('run-btn').textContent='↺ Re-run';
      simRunning=false;
      // final output panel
      $('output-body').innerHTML=outputs.map(o=>`
        <div class="out-item">
          <div class="out-step">${o.num} — ${o.name}</div>
          <div>${o.output}</div>
        </div>`).join('');
      return;
    }
    const s=steps[idx];
    const pct=Math.round((idx/total)*100);
    $('prog-bar').style.width=pct+'%';
    $('prog-label').textContent=`Step ${idx+1}/${total}`;
    renderSteps(idx,done);
    // log
    const ts=new Date().toLocaleTimeString('en-GB',{hour12:false});
    logLines.push(`<div class="log-line"><span class="log-ts">[${ts}]</span> ${s.agent} → <strong>${s.name}</strong> (${s.num})</div>`);
    $('log-body').innerHTML=logLines.join('');
    $('log-body').scrollTop=$('log-body').scrollHeight;

    setTimeout(()=>{
      done.add(idx);
      outputs.push(s);
      renderSteps(-1,done);
      idx++;
      simTimer=setTimeout(tick,600);
    },900);
  }
  tick();
}

$('run-btn').addEventListener('click',()=>{
  if($('run-btn').textContent.includes('Re-run')) resetSim();
  runSim();
});

document.querySelectorAll('.panel-tab').forEach(t=>{

// ── ASSESSMENT WIZARD ──────────────────────────────────────────────────────
function renderAssess(){
  const ind=DATA.INDUSTRIES.find(i=>i.id===curInd);
  const p=curProcObj();
  const col=ind.color;
  $('assess-body').innerHTML=`
    <div class="assess-steps">
      ${[1,2,3].map(n=>`
        ${n>1?'<div class="assess-line"></div>':''}
        <div class="assess-step-dot${assessStep===n?' active':assessStep>n?' done':''}" data-n="${n}">${assessStep>n?'✓':n}</div>
      `).join('')}
    </div>
    <div class="assess-form${assessStep===1?' active':''}" id="af1">
      <div class="assess-q">Which process areas are you automating?</div>
      <div class="assess-pills">
        ${DATA.PROCESSES.map(pp=>`<div class="assess-pill${(assessData.procs||[]).includes(pp.id)?' sel':''}" data-v="${pp.id}">${pp.icon} ${pp.name}</div>`).join('')}
      </div>
      <button class="assess-btn" onclick="assessNext(1)">Next →</button>
    </div>
    <div class="assess-form${assessStep===2?' active':''}" id="af2">
      <div class="assess-q">Monthly transaction volume?</div>
      <div class="assess-pills">
        ${['<1K','1K–10K','10K–100K','>100K'].map(v=>`<div class="assess-pill${assessData.vol===v?' sel':''}" data-v="${v}">${v}</div>`).join('')}
      </div>
      <div class="assess-q" style="margin-top:10px">Current ERP / landscape?</div>
      <input class="assess-input" id="erp-input" placeholder="e.g. D365 Finance + SCM" value="${assessData.erp||''}">
      <button class="assess-btn" onclick="assessNext(2)">Next →</button>
    </div>
    <div class="assess-form${assessStep===3?' active':''}" id="af3">
      <div class="assess-q">Human oversight preference?</div>
      <div class="assess-pills">
        ${['Fully automated','Human-in-loop','Human-on-loop','Manual approval'].map(v=>`<div class="assess-pill${assessData.oversight===v?' sel':''}" data-v="${v}">${v}</div>`).join('')}
      </div>
      <button class="assess-btn" onclick="assessNext(3)">Generate Assessment →</button>
    </div>
    <div id="assess-result" style="display:none"></div>
  `;
  // wire pills
  document.querySelectorAll('#assess-body .assess-pill').forEach(pill=>{
    pill.addEventListener('click',()=>{
      const form=pill.closest('.assess-form');
      const q=pill.closest('.assess-pills');
      const multi=form?.id==='af1';
      if(multi){
        pill.classList.toggle('sel');
        assessData.procs=[...q.querySelectorAll('.sel')].map(x=>x.dataset.v);
      } else {
        q.querySelectorAll('.sel').forEach(x=>x.classList.remove('sel'));
        pill.classList.add('sel');
        if(form?.id==='af2') assessData.vol=pill.dataset.v;
        if(form?.id==='af3') assessData.oversight=pill.dataset.v;
      }
    });
  });
}

function assessNext(step){
  if(step===1){
    if(!(assessData.procs||[]).length){ alert('Select at least one process'); return; }
    assessStep=2;
  } else if(step===2){
    assessData.erp=$('erp-input')?.value||'';
    if(!assessData.vol){ alert('Select a volume range'); return; }
    assessStep=3;
  } else {
    if(!assessData.oversight){ alert('Select oversight preference'); return; }
    assessStep=4;
    showAssessResult();
    return;
  }
  renderAssess();
}

function showAssessResult(){
  const n=assessData.procs.length;
  const volMul={'<1K':1,'1K–10K':3,'10K–100K':8,'>100K':18}[assessData.vol]||3;
  const totalAgents=Math.min(n*5+2,42);
  const instances=Math.max(2,Math.round(volMul*n/3));
  const monthlyCost=Math.round(instances*n*220);
  const setupCost=Math.round(n*12000);
  const col=indColor();
  $('assess-result').style.display='block';
  $('assess-result').innerHTML=`
    <div class="assess-result">
      <div class="ar-title">📊 Assessment Result</div>
      <div class="ar-grid">
        <div class="ar-metric"><div class="arv" style="color:${col}">${totalAgents}</div><div class="arl">Total Agents</div></div>
        <div class="ar-metric"><div class="arv" style="color:${col}">${instances}</div><div class="arl">Agent Instances</div></div>
        <div class="ar-metric"><div class="arv" style="color:${col}">€${(monthlyCost/1000).toFixed(0)}K</div><div class="arl">Est. Monthly Cost</div></div>
      </div>
      <div class="ar-phases">
        <strong>Setup cost estimate:</strong> €${(setupCost/1000).toFixed(0)}K one-time<br>
        <strong>Phase 1 (0–3 mo):</strong> Pilot ${assessData.procs.slice(0,2).map(id=>DATA.PROCESSES.find(p=>p.id===id)?.name).join(', ')}<br>
        <strong>Phase 2 (3–6 mo):</strong> Expand to remaining ${n-2>0?n-2:0} processes<br>
        <strong>Phase 3 (6–12 mo):</strong> Optimise, add cross-process orchestration<br>
        <strong>Oversight:</strong> ${assessData.oversight}
      </div>
      <div class="ar-check">
        <div class="ar-check-title">Customer Preparation Checklist</div>
        <ul>
          <li>D365 environment access and API credentials</li>
          <li>Process owner sign-off for each automation domain</li>
          <li>Data quality baseline assessment completed</li>
          <li>Azure AI Foundry subscription provisioned</li>
          <li>Change management and user training plan</li>
          <li>Governance and escalation matrix defined</li>
        </ul>
      </div>
    </div>`;
}

  document.querySelectorAll('#config-body .cfg-pill').forEach(pill=>{

        pill.classList.add('sel');

        document.querySelectorAll('[data-type="mode"]').forEach(x=>x.classList.remove('sel'));
        pill.classList.add('sel');
      } else if(type==='source'){
        pill.classList.toggle('sel');
        cfgState.sources=[...document.querySelectorAll('[data-type="source"].sel')].map(x=>x.dataset.v);
      }

async function generateConfig(){
  const p=curProcObj();
  const ind=DATA.INDUSTRIES.find(i=>i.id===curInd);
  const btn=$('cfg-gen-btn');
  const out=$('cfg-output');
  cfgState.endpoint=$('az-endpoint')?.value||'';
  cfgState.rg=$('az-rg')?.value||'';
  btn.disabled=true;
  btn.textContent='⏳ Generating...';
  out.style.display='block';
  out.textContent='Calling Claude API...';

  const prompt=`Generate a production Azure AI Foundry YAML configuration for:
Process: ${p.num} - ${p.name}
Industry: ${ind.name}
Model: ${cfgState.model}
Mode: ${cfgState.mode}
Data sources: ${(cfgState.sources||[]).join(', ')}
Agents: ${p.agents.map(a=>a.label).join(', ')}
Steps: ${curSteps().map(s=>s.name).join(', ')}

Return ONLY valid YAML config with: project metadata, agent definitions (one per agent above with role, model, tools, guardrails), data_sources, orchestration settings, monitoring, audit_log, managed_identity, spend_threshold. No explanation.`;

  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const text=data.content?.map(c=>c.text||'').join('')||'Error generating config.';
    const yaml=text.replace(/```ya?ml|```/gi,'').trim();
    out.textContent=yaml;
    $('cfg-actions').style.display='flex';
    window._lastYaml=yaml;
  } catch(e){
    out.textContent='Error: '+e.message;
  }
  btn.disabled=false;
  btn.textContent='⚡ Generate AI Foundry Config';
}

function copyConfig(){
  navigator.clipboard.writeText(window._lastYaml||'').then(()=>alert('Copied!'));
}

function downloadConfig(){
  const a=document.createElement('a');
  a.href='data:text/yaml;charset=utf-8,'+encodeURIComponent(window._lastYaml||'');
  a.download=`bpc-${curProc}-${curInd}.yaml`;
  a.click();
}
